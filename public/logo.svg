<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0F6FC"/>
      <stop offset="100%" stop-color="#C9D1D9"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D395"/>
      <stop offset="100%" stop-color="#00B87A"/>
    </linearGradient>
  </defs>

  <!-- Lightning bolt icon -->
  <path d="M8 6 L16 6 L12 18 L20 18 L10 42 L14 26 L6 26 Z" fill="url(#bolt)" transform="translate(0, 2) scale(0.9)"/>

  <!-- Dopami text -->
  <text x="30" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="url(#text)" letter-spacing="-0.5">
    Dopami
  </text>

  <!-- Stylized X -->
  <text x="160" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" fill="url(#xGrad)" letter-spacing="-1">
    X
  </text>

  <!-- Glow effect under X -->
  <ellipse cx="170" cy="44" rx="12" ry="2" fill="#00D395" opacity="0.3"/>
</svg>
